<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaladin's Calculator</title>
    <link rel="stylesheet" href="styles.css">
    <script src="javascript.js" defer></script>
</head>
<body>
    <div id="calculator-container">
        <div id="calculator-display"></div>
        <div id="calculator-buttons">
            <span class="button-row">
                <button id="zero-button">0</button>
                <button id="decimal-button">.</button>
                <button id="plus-or-minus-button">+/-</button>
                <button id="equals-button" class="operator-button">=</button>
            </span>
            <span class="button-row">
                <button id="one-button">1</button>
                <button id="two-button">2</button>
                <button id="three-button">3</button>
                <button id="plus-button" class="operator-button">+</button>
            </span>
            <span class="button-row">
                <button id="four-button">4</button>
                <button id="five-button">5</button>
                <button id="six-button">6</button>
                <button id="subtract-button" class="operator-button">-</button>
            </span>
            <span class="button-row">
                <button id="seven-button">7</button>
                <button id="eight-button">8</button>
                <button id="nine-button">9</button>
                <button id="multiply-button" class="operator-button">*</button>

            </span>
            <span class="button-row">
                <button id="clear-button">Clear</button>
                <button id="backspace-button">⌫</button>
                <button id="divide-button" class="operator-button">/</button>
            </span>
        </div>
    </div>
</body>
</html>
